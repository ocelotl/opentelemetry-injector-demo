services:
  prepare-python-agent:
    image: python:3.13-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ./python-agent:/python-agent
    command: >
      sh -lc "
        rm -rf /python-agent/* &&
        pip install --target /python-agent opentelemetry-api opentelemetry-sdk opentelemetry-instrumentation-requests requests msgpack &&
        cp /workspace/sitecustomize.py /python-agent/sitecustomize.py &&
        echo 'prepare-python-agent: done'
      "

  app:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - .:/app
      - ./python-agent:/python-agent
    environment:
      PYTHONPATH: /python-agent
      SIDECAR_HOST: sidecar
      SIDECAR_PORT: "9999"
      SIDECAR_MAX_BATCH_DELAY_SECONDS: "2.0"
    command: python app.py
    depends_on:
      prepare-python-agent:
        condition: service_completed_successfully
      sidecar:
        condition: service_started

  sidecar:
    image: python:3.13-slim
    working_dir: /sidecar
    volumes:
      - .:/sidecar
    environment:
      OTLP_ENDPOINT: http://collector:4317
    command: >
      sh -lc "
        pip install opentelemetry-sdk opentelemetry-exporter-otlp-proto-grpc msgpack &&
        python sidecar.py
      " 
    depends_on:
      - collector

  collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/collector-config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otelcol/collector-config.yaml
