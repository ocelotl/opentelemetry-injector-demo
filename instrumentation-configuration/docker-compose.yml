services:

  # ---------------------------------------------------------------------------
  # Installs the OTel SDK (from the pyproto branch of ocelotl/opentelemetry-python,
  # which includes the instrumentation.python declarative config support) plus
  # Flask and opentelemetry-instrumentation-flask into python-agent/glibc/.
  # PYTHONPATH on the app container adds that directory to sys.path, so Python
  # auto-executes sitecustomize.py before any application code.
  # ---------------------------------------------------------------------------
  prepare-python-agent:
    image: python:3.13-slim
    volumes:
      - .:/workspace
      - ./python-agent:/python-agent
    command:
      - sh
      - -lc
      - |
        apt-get update -qq && apt-get install -y --no-install-recommends git
        rm -rf /python-agent/*
        mkdir -p /python-agent/glibc
        pip install --no-cache-dir --target /python-agent/glibc \
          pyyaml \
          jsonschema \
          flask \
          opentelemetry-instrumentation-flask \
          'opentelemetry-api @ git+https://github.com/ocelotl/opentelemetry-python@pyproto#subdirectory=opentelemetry-api' \
          'opentelemetry-sdk @ git+https://github.com/ocelotl/opentelemetry-python@pyproto#subdirectory=opentelemetry-sdk' \
          'opentelemetry-semantic-conventions @ git+https://github.com/ocelotl/opentelemetry-python@pyproto#subdirectory=opentelemetry-semantic-conventions' \
          'opentelemetry-exporter-otlp-json-common @ git+https://github.com/ocelotl/opentelemetry-python@pyproto#subdirectory=exporter/opentelemetry-exporter-otlp-json-common' \
          'opentelemetry-exporter-otlp-json-file @ git+https://github.com/ocelotl/opentelemetry-python@pyproto#subdirectory=exporter/opentelemetry-exporter-otlp-json-file'
        cp /workspace/sitecustomize.py /python-agent/glibc/sitecustomize.py
        echo 'prepare-python-agent: done'

  # ---------------------------------------------------------------------------
  # Runs the Flask app.  PYTHONPATH causes Python to find sitecustomize.py in
  # python-agent/glibc/ and execute it before app.py.  sitecustomize.py calls
  # configure_sdk(), which reads otel-config.yaml and calls
  # FlaskInstrumentor().instrument() via the instrumentation/development.python
  # section — without any explicit OTel code in app.py.
  #
  # Trace/metric/log JSONL is written to ./output/ (mounted at /output).
  # ---------------------------------------------------------------------------
  app:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - .:/app
      - ./python-agent:/python-agent
      - ./output:/output
    environment:
      PYTHONPATH: /python-agent/glibc
      OTEL_CONFIG_FILE: /app/otel-config.yaml
    ports:
      - "5000:5000"
    command:
      - sh
      - -lc
      - PYTHONPATH=/python-agent/glibc python app.py
    depends_on:
      prepare-python-agent:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Sends a handful of requests so that Flask spans are generated and written
  # to output/traces.jsonl.
  # ---------------------------------------------------------------------------
  traffic:
    image: python:3.13-slim
    command:
      - sh
      - -lc
      - |
        pip install -q requests
        python - <<'EOF'
import time, requests

time.sleep(3)
for path in ['/', '/items/1', '/items/2', '/items/42']:
    r = requests.get(f'http://app:5000{path}')
    print(f'traffic: {path} -> {r.status_code}', flush=True)
print('traffic: done', flush=True)
EOF
    depends_on:
      - app
