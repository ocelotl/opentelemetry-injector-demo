file_format: "1.1"

propagators:
  composite:
    - tracecontext: {}
      baggage: {}

resource:
  attributes:
    - name: service.name
      value: instrumentation-config-demo

tracer_provider:
  processors:
    - simple:
        exporter:
          otlp_file/development:
            output_stream: file:///output/traces.jsonl

logger_provider:
  processors:
    - batch:
        exporter:
          otlp_file/development:
            output_stream: file:///output/logs.jsonl

meter_provider:
  readers:
    - periodic:
        interval: 5000
        exporter:
          otlp_file/development:
            output_stream: file:///output/metrics.jsonl

# This is the section under test: FlaskInstrumentor is activated by the SDK
# reading this config — no FlaskInstrumentor().instrument() call anywhere in
# the application or bootstrap code.
instrumentation/development:
  python:
    flask: {}
