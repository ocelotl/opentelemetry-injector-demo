services:

  # ---------------------------------------------------------------------------
  # Installs OTel API/SDK + instrumentation libraries + the pure-Python pyproto
  # exporter stack (no google.protobuf) from the public pyproto branch of
  # opentelemetry-python, then copies sitecustomize.py into the agent directory.
  # ---------------------------------------------------------------------------
  prepare-python-agent:
    image: python:3.13-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ./python-agent:/python-agent
    command: >
      sh -lc "
        apt-get update -qq && apt-get install -y --no-install-recommends git &&
        rm -rf /python-agent/* &&
        pip install --no-cache-dir --target /python-agent opentelemetry-api opentelemetry-sdk opentelemetry-instrumentation-requests opentelemetry-instrumentation-logging requests 'opentelemetry-pyproto @ git+https://github.com/ocelotl/opentelemetry-python@pyproto#subdirectory=opentelemetry-pyproto' 'opentelemetry-exporter-otlp-pyproto-common @ git+https://github.com/ocelotl/opentelemetry-python@pyproto#subdirectory=exporter/opentelemetry-exporter-otlp-pyproto-common' 'opentelemetry-exporter-otlp-pyproto-http @ git+https://github.com/ocelotl/opentelemetry-python@pyproto#subdirectory=exporter/opentelemetry-exporter-otlp-pyproto-http' &&
        cp /workspace/sitecustomize.py /python-agent/sitecustomize.py &&
        chown -R ${SCRIPT_UID}:${SCRIPT_GID} /python-agent &&
        echo 'prepare-python-agent: done'
      "

  app:
    image: python:3.13-slim
    working_dir: /app/pyprotobuf
    volumes:
      - ..:/app
      - ./python-agent:/python-agent
    environment:
      PYTHONPATH: /python-agent
      OTEL_EXPORTER_OTLP_ENDPOINT: http://collector:4318
    command: python app.py
    depends_on:
      prepare-python-agent:
        condition: service_completed_successfully
      collector:
        condition: service_started

  collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/collector-config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otelcol/collector-config.yaml
      - ../compare-output/pyprotobuf:/output
