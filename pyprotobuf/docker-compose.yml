services:

  # ---------------------------------------------------------------------------
  # Installs OTel API/SDK + instrumentation libraries + the pure-Python pyproto
  # exporter stack (no google.protobuf) from local source, then copies
  # sitecustomize.py into the agent directory.
  # ---------------------------------------------------------------------------
  prepare-python-agent:
    image: python:3.13-slim
    user: "${UID}:${GID}"
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ./python-agent:/python-agent
      - /home/tigre/github/ocelotl/opentelemetry/opentelemetry-python:/opentelemetry-python:ro
    command: >
      sh -lc "
        rm -rf /python-agent/* &&
        pip install --no-cache-dir --target /python-agent opentelemetry-api opentelemetry-sdk opentelemetry-instrumentation-requests opentelemetry-instrumentation-logging requests /opentelemetry-python/opentelemetry-pyproto /opentelemetry-python/exporter/opentelemetry-exporter-otlp-pyproto-common /opentelemetry-python/exporter/opentelemetry-exporter-otlp-pyproto-http &&
        cp /workspace/sitecustomize.py /python-agent/sitecustomize.py &&
        echo 'prepare-python-agent: done'
      "

  app:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - .:/app
      - ./python-agent:/python-agent
    environment:
      PYTHONPATH: /python-agent
      OTEL_EXPORTER_OTLP_ENDPOINT: http://collector:4318
    command: python app.py
    depends_on:
      prepare-python-agent:
        condition: service_completed_successfully
      collector:
        condition: service_started

  collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/collector-config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otelcol/collector-config.yaml
      - ../compare-output/pyprotobuf:/output
